# Crowdin configuration — https://developer.crowdin.com/configuration-file/
# French is the source language; translations live next to it, one JSON per language.
# Project id and API token come from the environment (CI secret), never from this file:
#   CROWDIN_PROJECT_ID, CROWDIN_PERSONAL_TOKEN
project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN

preserve_hierarchy: true

files:
  - source: /src/frontend/src/i18n/locales/fr.json
    translation: /src/frontend/src/i18n/locales/%two_letters_code%.json
    type: i18next_json
