name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (ruff + Django tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      # The test suite renders a PDF page to PNG through poppler (pdftoppm); the
      # render helper raises instead of skipping when the tool is missing.
      - name: Install system dependencies (poppler)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: uv venv && uv pip install -e '.[dev]'

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests
        run: uv run python manage.py test

  frontend:
    name: Frontend (typecheck + build + CRDT verify)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: CRDT invariants
        run: npm run verify:crdt && npm run verify:deck && npm run verify:text
